---
  version: 2
  jobs:
    build:
      working_directory: ~/airplays
      docker:
        - image: cimg/ruby:4.0.3-browsers
          environment:
            POSTGRES_HOST: localhost
            POSTGRES_USER: airplays
            RAILS_ENV: test
        - image: postgres:13
          environment:
            POSTGRES_USER: airplays
            POSTGRES_DB: airplays_test
            POSTGRES_PASSWORD: "Super-C0mpl3X"

      steps:
        - checkout
        - add_ssh_keys:
            fingerprints:
              - "0d:3b:3a:6e:fb:ba:86:a9:9d:fa:41:ab:bc:3b:56:31"

        # Restore Cached Dependencies
        - type: cache-restore
          name: Restore bundle cache
          key: airplays-{{ checksum "Gemfile.lock" }}

        # Install system dependencies
        - run: sudo apt-get update -qq && sudo apt-get install -y tesseract-ocr tesseract-ocr-eng tesseract-ocr-nld tesseract-ocr-deu tesseract-ocr-fra tesseract-ocr-spa tesseract-ocr-ita tesseract-ocr-por tesseract-ocr-rus tesseract-ocr-tur

        # install bundler
        - run: gem install bundler:4.0.10

        # Bundle install dependencies
        - run: bundle config set path 'vendor/bundle'
        - run: bundle install

        # Cache Dependencies
        - type: cache-save
          name: Store bundle cache
          key: airplays-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor/bundle

        # Wait for DB
        - run: dockerize -wait tcp://localhost:5432 -timeout 1m

        # Setup the environment
        - run: cp .env.circle-ci .env

        # update rake
        - run: bundle update rake
        - run: gem install uri -v 0.10.1

        # Setup the database
        - run: bundle exec rails db:test:prepare
        - run: bundle exec rails db:seed

        # Run the tests
        - run: bundle exec rspec
        - run: bundle exec rubocop

        - store_artifacts:
            path: ~/airplays/coverage
        - store_artifacts:
            path: ~/airplays/log
