version: '3'

x-sidekiq-base: &sidekiq_base
  depends_on:
    - postgres
    - redis
  build:
    context: .
    dockerfile: dev.Dockerfile
  environment:
    - RAILS_ENV=development
    - POSTGRES_HOST=postgres
    - POSTGRES_USER=postgres
    - RAILS_LOG_TO_STDOUT=true
    - REDIS_SIDEKIQ_URL=redis://redis:6379/2
    - REDIS_CACHE_URL=redis://redis:6379/1
    - ACOUSTID_API_KEY=${ACOUSTID_API_KEY}
  volumes:
    - .:/app

services:
  postgres:
    image: postgres:13
    shm_size: 256mb
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust

  redis:
    image: redis:latest
    command: redis-server
    hostname: redis
    volumes:
      - ./tmp/redis:/var/lib/redis/data

  sidekiq_realtime:
    <<: *sidekiq_base
    command: bundle exec sidekiq -c 5 -q realtime
    deploy:
      resources:
        limits:
          memory: 512M

  sidekiq_compute:
    <<: *sidekiq_base
    command: bundle exec sidekiq -c 2 -q compute
    deploy:
      resources:
        limits:
          memory: 512M

  sidekiq_enrichment:
    <<: *sidekiq_base
    command: bundle exec sidekiq -c 3 -q enrichment
    deploy:
      resources:
        limits:
          memory: 512M

  radio_web:
    build:
      context: .
      dockerfile: dev.Dockerfile
    command: bash -c "rm -rf /app/tmp/pids && rails s -p 3000 -b 0.0.0.0"
    hostname: radio-web
    depends_on:
      - postgres
      - redis
    ports:
      - 3000:3000
    volumes:
      - .:/app
      - ~/.aws/:/root/.aws:ro
    environment:
      - RAILS_ENV=development
      - RAILS_LOG_TO_STDOUT=true
      - DOCKER_COMPOSE=true
      - NODE_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=postgres
      - REDIS_SIDEKIQ_URL=redis://redis:6379/2
      - REDIS_CACHE_URL=redis://redis:6379/1
      - ACOUSTID_API_KEY=${ACOUSTID_API_KEY}
    tty: true
    stdin_open: true
    deploy:
      resources:
        limits:
          memory: 512M

  persistent_streams:
    depends_on:
      - postgres
      - redis
    build:
      context: .
      dockerfile: dev.Dockerfile
    command: bundle exec rake persistent_streams:start
    environment:
      - RAILS_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=postgres
      - RAILS_LOG_TO_STDOUT=true
      - REDIS_SIDEKIQ_URL=redis://redis:6379/2
      - REDIS_CACHE_URL=redis://redis:6379/1
    volumes:
      - .:/app
    deploy:
      resources:
        limits:
          memory: 512M
