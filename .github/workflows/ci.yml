name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check
          fail_level: error

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: airplays
          POSTGRES_DB: airplays_test
          POSTGRES_PASSWORD: "Super-C0mpl3X"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_USER: airplays
      POSTGRES_PASSWORD: "Super-C0mpl3X"
      RAILS_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            tesseract-ocr \
            tesseract-ocr-eng \
            tesseract-ocr-nld \
            tesseract-ocr-deu \
            tesseract-ocr-fra \
            tesseract-ocr-spa \
            tesseract-ocr-ita \
            tesseract-ocr-por \
            tesseract-ocr-rus \
            tesseract-ocr-tur

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup environment
        run: cp .env.ci .env

      - name: Prepare test database
        run: bundle exec rails db:test:prepare

      - name: Seed database
        run: bundle exec rails db:seed

      - name: Run RSpec
        run: bundle exec rspec --format progress --format RspecJunitFormatter --out tmp/rspec_results.xml

      - name: Publish RSpec test report
        if: always()
        uses: mikepenz/action-junit-report@v6
        with:
          report_paths: tmp/rspec_results.xml
          check_name: RSpec results
          require_tests: true
          fail_on_failure: true

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

      - name: Upload log artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs
          path: log
          if-no-files-found: ignore

  swagger:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: airplays
          POSTGRES_DB: airplays_test
          POSTGRES_PASSWORD: "Super-C0mpl3X"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_USER: airplays
      POSTGRES_PASSWORD: "Super-C0mpl3X"
      RAILS_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup environment
        run: cp .env.ci .env

      - name: Prepare test database
        run: bundle exec rails db:test:prepare

      - name: Regenerate Swagger
        run: bundle exec rake rswag:specs:swaggerize

      - name: Verify Swagger is up to date
        run: |
          if ! git diff --exit-code -- swagger/; then
            echo "::error::swagger/v1/swagger.yaml is out of date. Run 'bundle exec rake rswag:specs:swaggerize' locally and commit the result."
            exit 1
          fi

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run Brakeman
        run: bundle exec brakeman --quiet --no-progress --no-summary -i config/brakeman.ignore --exit-on-warn --exit-on-error

      - name: Run bundler-audit
        run: bundle exec bundle-audit check --update

  rubocop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop

  build-and-push:
    needs: [actionlint, test, rubocop, security, swagger]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/samuelvaneck/airplays
          tags: |
            type=sha,format=long,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
