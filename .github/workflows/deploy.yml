name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (commit SHA or 'latest')"
        required: false
        default: latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    env:
      DEPLOY_TAG: ${{ inputs.tag }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify image tag exists in GHCR
        run: |
          if ! docker manifest inspect "ghcr.io/samuelvaneck/airplays:${DEPLOY_TAG}" > /dev/null 2>&1; then
            echo "::error::Image ghcr.io/samuelvaneck/airplays:${DEPLOY_TAG} not found in registry. Aborting deploy."
            exit 1
          fi
          echo "Image tag '${DEPLOY_TAG}' found."

      - name: Configure SSH
        env:
          SSH_KEY:     ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY"     > ~/.ssh/id_ed25519  && chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts && chmod 644 ~/.ssh/known_hosts
          echo "--- known_hosts (first/last fields only) ---"
          awk '{print $1, $2, "<base64-redacted>"}' ~/.ssh/known_hosts
          wc -c ~/.ssh/known_hosts

      - name: Deploy ${{ env.DEPLOY_TAG }}
        run: |
          ssh -o BatchMode=yes \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              "$DEPLOY_TAG"
