---
  :queues:
    - realtime
    - compute
    - enrichment
  :concurrency: 10
  :max_retries: 3
  :scheduler:
    :schedule:
      ImportSongsAllRadioStationsJob:
        cron: '* * * * *' # every minute
        queue: realtime
        enabled: true
      SendStatusEmail:
        cron: '0 2 * * *' # at 2am
        queue: enrichment
        enabled: false
      ChartCreationJob:
        cron: '10 0 * * *' # at 0:10 am
        queue: compute
        enabled: true
      ChartSongEnrichmentJob:
        cron: '30 0 * * *' # at 0:30 am (after chart creation)
        queue: enrichment
        enabled: true
      YoutubeApiImportJob:
        cron: '*/15 * * * *' # every 15 minutes
        queue: realtime
        enabled: true
      CleanupDraftAirPlaysJob:
        cron: '0 * * * *' # every hour
        queue: compute
        enabled: true
      SongImportLogCleanupJob:
        cron: '0 2 * * *' # at 2am daily
        queue: compute
        enabled: true
      SongImportMonitorJob:
        cron: '0 * * * *' # every hour
        queue: compute
        enabled: true
      ArtistEnrichmentBatchJob:
        cron: '0 3 * * 0' # weekly Sunday 3am
        queue: enrichment
        enabled: true
      LastfmEnrichmentBatchJob:
        cron: '0 4 * * 0' # weekly Sunday 4am
        queue: enrichment
        enabled: true
      LyricsEnrichmentBatchJob:
        cron: '0 5 * * 0' # weekly Sunday 5am
        queue: enrichment
        enabled: true
      AvgSongGapCalculationJob:
        cron: '0 5 * * *' # daily at 5am
        queue: compute
        enabled: true
      DatabaseVacuumJob:
        cron: '0 3 * * *' # daily at 3am
        queue: compute
        enabled: true
  :sidekiq_default_hooks: true
  :sidekiq_pid: File.join(shared_path, 'tmp', 'pids', 'sidekiq.pid')
  :sidekiq_env: fetch(:rack_env, fetch(:rails_env, fetch(:stage)))
  :sidekiq_log: File.join(shared_path, 'log', 'sidekiq.log')
  :sidekiq_options: nil
  :sidekiq_require: nil
  :sidekiq_tag: nil
  :sidekiq_config: nil
  :sidekiq_queue: nil
  :sidekiq_timeout: 10
  :sidekiq_role: :app
  :sidekiq_processes: 1
  :sidekiq_concurrency: nil
