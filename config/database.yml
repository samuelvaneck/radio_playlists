default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV['POSTGRES_USER'] || 'postgres' %>
  password: <%= ENV['POSTGRES_PASSWORD'] %>
  host: <%= ENV['POSTGRES_HOST'] || 'localhost' %>
  pool: <%= ENV.fetch('RAILS_MAX_THREADS', 15).to_i + 5 %>

development:
  <<: *default
  database: airplays_development

test:
  <<: *default
  database: airplays_test

production:
  <<: *default
  database: <%= ENV['POSTGRES_DB'] %>
  username: <%= ENV['POSTGRES_USER'] %>
  password: <%= ENV['POSTGRES_PASSWORD'] %>

staging:
  <<: *default
  database: <%= ENV['POSTGRES_DB'] %>
  url: <%= ENV['POSTGRES_URL'] %>
