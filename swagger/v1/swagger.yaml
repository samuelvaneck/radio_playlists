---
openapi: 3.0.1
info:
  title: Airplays API
  version: v1
  description: API for tracking songs played on Dutch radio stations with Spotify
    and YouTube integration
paths:
  "/api/v1/admins/artists":
    get:
      summary: List artists for admin
      tags:
      - Admin Artists
      security:
      - bearer_auth: []
      parameters:
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        description: Items per page
        schema:
          type: integer
      - name: search_term
        in: query
        required: false
        description: Search by name
        schema:
          type: string
      responses:
        '200':
          description: Artists retrieved successfully
        '401':
          description: Not authenticated
  "/api/v1/admins/artists/{id}":
    patch:
      summary: Update an artist
      tags:
      - Admin Artists
      security:
      - bearer_auth: []
      parameters:
      - name: id
        in: path
        required: true
        description: Artist ID
        schema:
          type: integer
      responses:
        '200':
          description: Artist updated successfully
        '401':
          description: Not authenticated
        '404':
          description: Artist not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                artist:
                  type: object
                  properties:
                    website_url:
                      type: string
                    instagram_url:
                      type: string
  "/api/v1/admins/sign_in":
    post:
      summary: Admin sign in
      tags:
      - Admin Authentication
      parameters: []
      responses:
        '200':
          description: Logged in successfully
        '401':
          description: Authentication failed
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                admin:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                  required:
                  - email
                  - password
  "/api/v1/admins/sign_out":
    delete:
      summary: Admin sign out
      tags:
      - Admin Authentication
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Logged out successfully
  "/api/v1/admins/current":
    get:
      summary: Get current admin
      tags:
      - Admin
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Current admin retrieved successfully
        '401':
          description: Not authenticated
  "/api/v1/admins/radio_stations":
    get:
      summary: List radio stations for admin
      tags:
      - Admin Radio Stations
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Radio stations retrieved successfully
        '401':
          description: Not authenticated
  "/api/v1/admins/songs":
    get:
      summary: List songs for admin
      tags:
      - Admin Songs
      security:
      - bearer_auth: []
      parameters:
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        description: Items per page
        schema:
          type: integer
      - name: search_term
        in: query
        required: false
        description: Search by title
        schema:
          type: string
      responses:
        '200':
          description: Songs retrieved successfully
        '401':
          description: Not authenticated
  "/api/v1/admins/songs/{id}":
    patch:
      summary: Update a song
      tags:
      - Admin Songs
      security:
      - bearer_auth: []
      parameters:
      - name: id
        in: path
        required: true
        description: Song ID
        schema:
          type: integer
      responses:
        '200':
          description: Song updated successfully
        '401':
          description: Not authenticated
        '404':
          description: Song not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                song:
                  type: object
                  properties:
                    id_on_youtube:
                      type: string
  "/api/v1/air_plays":
    get:
      summary: List recent air plays
      tags:
      - AirPlays
      description: Use either period OR start_time/end_time (mutually exclusive).
        Returns 400 if both provided.
      parameters:
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: period
        in: query
        required: false
        description: 'Time period: hour, two_hours, four_hours, eight_hours, twelve_hours,
          day, week, month, year, all. Mutually exclusive with start_time/end_time'
        schema:
          type: string
      - name: start_time
        in: query
        required: false
        description: Custom start time (YYYY-MM-DDTHH:MM). Mutually exclusive with
          period
        schema:
          type: string
      - name: end_time
        in: query
        required: false
        description: Custom end time (YYYY-MM-DDTHH:MM). Defaults to current time
        schema:
          type: string
      - name: radio_station_ids[]
        in: query
        items:
          type: integer
        required: false
        description: Filter by radio station IDs
        schema:
          type: array
      - name: search_term
        in: query
        required: false
        description: Search by song title or artist name
        schema:
          type: string
      responses:
        '200':
          description: Air plays retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                    - id: '1'
                      type: air_play
                      attributes:
                        id: 1
                        broadcasted_at: '2024-12-01T14:30:00Z'
                        song:
                          id: 1
                          title: Bohemian Rhapsody
                          spotify_artwork_url: https://i.scdn.co/image/abc123
                          artists:
                          - id: 1
                            name: Queen
                        radio_station:
                          id: 1
                          name: Radio 538
                          slug: radio-538
                    - id: '2'
                      type: air_play
                      attributes:
                        id: 2
                        broadcasted_at: '2024-12-01T14:26:00Z'
                        song:
                          id: 2
                          title: Blinding Lights
                          spotify_artwork_url: https://i.scdn.co/image/def456
                          artists:
                          - id: 2
                            name: The Weeknd
                        radio_station:
                          id: 2
                          name: Qmusic
                          slug: qmusic
                    total_entries: 1500
                    total_pages: 63
                    current_page: 1
  "/api/v1/artists":
    get:
      summary: List artists
      tags:
      - Artists
      description: Use either period OR start_time/end_time (mutually exclusive).
        Returns 400 if both provided.
      parameters:
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      - name: period
        in: query
        required: false
        description: 'Time period: hour, two_hours, four_hours, eight_hours, twelve_hours,
          day, week, month, year, all. Mutually exclusive with start_time/end_time'
        schema:
          type: string
      - name: start_time
        in: query
        required: false
        description: Custom start time (YYYY-MM-DDTHH:MM). Mutually exclusive with
          period
        schema:
          type: string
      - name: end_time
        in: query
        required: false
        description: Custom end time (YYYY-MM-DDTHH:MM). Defaults to current time
        schema:
          type: string
      - name: radio_station_ids[]
        in: query
        items:
          type: integer
        required: false
        description: Filter by radio station IDs
        schema:
          type: array
      - name: search_term
        in: query
        required: false
        description: Search by artist name
        schema:
          type: string
      responses:
        '200':
          description: Artists retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                    - id: '1'
                      type: artist
                      attributes:
                        id: 1
                        name: Queen
                        image: https://i.scdn.co/image/abc123
                        id_on_spotify: 1dfeR4HaWDbWqFHLkxsg1d
                        genres:
                        - rock
                        - classic-rock
                        spotify_popularity: 85
                        spotify_followers_count: 42000000
                        country_of_origin:
                        - United Kingdom
                        lastfm_listeners: 5800000
                        lastfm_playcount: 200000000
                        lastfm_tags:
                        - rock
                        - classic-rock
                        - british
                        counter: 156
                    total_entries: 50
                    total_pages: 3
                    current_page: 1
  "/api/v1/artists/autocomplete":
    get:
      summary: Autocomplete artists by name
      tags:
      - Artists
      description: Search artists by name for autocomplete functionality
      parameters:
      - name: q
        in: query
        required: true
        description: Search query string
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: 'Maximum number of results (default: 10, max: 20)'
        schema:
          type: integer
      responses:
        '200':
          description: Autocomplete results retrieved successfully
          content:
            application/json:
              examples:
                with_results:
                  value:
                    data:
                    - id: '1'
                      type: artist
                      attributes:
                        id: 1
                        name: Queen
                        spotify_artwork_url: https://i.scdn.co/image/abc123
                    - id: '2'
                      type: artist
                      attributes:
                        id: 2
                        name: Queens of the Stone Age
                        spotify_artwork_url: https://i.scdn.co/image/def456
                empty_results:
                  value:
                    data: []
  "/api/v1/artists/search":
    get:
      summary: Faceted search for artists
      tags:
      - Artists
      description: Search artists with structured filters. All filters are optional
        and combinable.
      parameters:
      - name: q
        in: query
        required: false
        description: Free text search on artist name
        schema:
          type: string
      - name: name
        in: query
        required: false
        description: Filter by artist name (fuzzy match)
        schema:
          type: string
      - name: genre
        in: query
        required: false
        description: Filter by genre
        schema:
          type: string
      - name: country
        in: query
        required: false
        description: Filter by country of origin
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: 'Maximum number of results (default: 10, max: 20)'
        schema:
          type: integer
      - name: sort_by
        in: query
        required: false
        description: 'Sort order: popularity (default), most_played'
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number for pagination (24 items per page)
        schema:
          type: integer
      responses:
        '200':
          description: Returns artists ordered by popularity
          content:
            application/json:
              examples:
                with_genre_filter:
                  value:
                    data:
                    - id: '1'
                      type: artist
                      attributes:
                        id: 1
                        name: Coldplay
                        genres:
                        - rock
                        - pop
                        country_of_origin:
                        - United Kingdom
  "/api/v1/artists/search_suggestions":
    get:
      summary: Get search suggestions for a field
      tags:
      - Artists
      description: Returns autocomplete suggestions for a specific artist search field
      parameters:
      - name: field
        in: query
        required: false
        description: 'Field to suggest values for: name, genre, country'
        schema:
          type: string
      - name: q
        in: query
        required: false
        description: Partial input to filter suggestions
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: 'Maximum suggestions (default: 5, max: 10)'
        schema:
          type: integer
      responses:
        '200':
          description: Available fields when no field specified
          content:
            application/json:
              examples:
                genre_suggestions:
                  value:
                    suggestions:
                    - rock
                    - pop
                    - hip-hop
                    field: genre
                available_fields:
                  value:
                    suggestions:
                    - name
                    - genre
                    - country
                    field:
  "/api/v1/artists/{id}":
    get:
      summary: Get an artist
      tags:
      - Artists
      parameters:
      - name: id
        in: path
        required: true
        description: Artist ID or slug
        schema:
          type: string
      responses:
        '200':
          description: Artist retrieved successfully by slug
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                      id: '1'
                      type: artist
                      attributes:
                        id: 1
                        name: Queen
                        slug: queen
                        image: https://i.scdn.co/image/abc123
                        id_on_spotify: 1dfeR4HaWDbWqFHLkxsg1d
                        genres:
                        - rock
                        - classic-rock
                        spotify_popularity: 85
                        spotify_followers_count: 42000000
                        country_of_origin:
                        - United Kingdom
                        lastfm_listeners: 5800000
                        lastfm_playcount: 200000000
                        lastfm_tags:
                        - rock
                        - classic-rock
                        - british
                        counter: 156
        '404':
          description: Artist not found
          content:
            application/json:
              examples:
                example:
                  value:
                    status: 404
                    error: Not Found
  "/api/v1/artists/{id}/graph_data":
    get:
      summary: Get artist play count graph data
      tags:
      - Artists
      parameters:
      - name: id
        in: path
        required: true
        description: Artist ID
        schema:
          type: integer
      - name: period
        in: query
        required: false
        description: Time period (day, week, month, year, all)
        schema:
          type: string
      responses:
        '200':
          description: Graph data retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    labels:
                    - '2024-12-01'
                    - '2024-12-02'
                    - '2024-12-03'
                    - '2024-12-04'
                    - '2024-12-05'
                    counts:
                    - 12
                    - 18
                    - 25
                    - 14
                    - 30
  "/api/v1/artists/{id}/songs":
    get:
      summary: Get artist songs
      tags:
      - Artists
      parameters:
      - name: id
        in: path
        required: true
        description: Artist ID
        schema:
          type: integer
      responses:
        '200':
          description: Artist songs retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                    - id: '1'
                      type: song
                      attributes:
                        id: 1
                        title: Bohemian Rhapsody
                        spotify_artwork_url: https://i.scdn.co/image/abc123
                        id_on_spotify: 4u7EnebtmKWzUH433cf5Qv
                        album_name: A Night at the Opera
                        lastfm_listeners: 1200000
                        lastfm_playcount: 5500000
                        lastfm_tags:
                        - rock
                        - classic-rock
                        counter: 42
                        artists:
                        - id: 1
                          name: Queen
                          country_of_origin:
                          - United Kingdom
                    - id: '2'
                      type: song
                      attributes:
                        id: 2
                        title: We Will Rock You
                        spotify_artwork_url: https://i.scdn.co/image/def456
                        id_on_spotify: 54flyrjcdnQdco7300avMJ
                        album_name: News of the World
                        lastfm_listeners: 980000
                        lastfm_playcount: 4200000
                        lastfm_tags:
                        - rock
                        - classic-rock
                        counter: 38
                        artists:
                        - id: 1
                          name: Queen
                          country_of_origin:
                          - United Kingdom
  "/api/v1/artists/{id}/chart_positions":
    get:
      summary: Get artist chart positions over time
      tags:
      - Artists
      parameters:
      - name: id
        in: path
        required: true
        description: Artist ID
        schema:
          type: integer
      - name: period
        in: query
        required: false
        description: 'Time period (week, month, year, all). Default: month'
        schema:
          type: string
      responses:
        '200':
          description: Chart positions retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                  - date: '2024-12-01'
                    position: 3
                    counts: 85
                  - date: '2024-12-02'
                    position: 2
                    counts: 92
                  - date: '2024-12-03'
                    position: 1
                    counts: 110
  "/api/v1/artists/{id}/time_analytics":
    get:
      summary: Get artist time-based analytics
      tags:
      - Artists
      parameters:
      - name: id
        in: path
        required: true
        description: Artist ID
        schema:
          type: integer
      - name: radio_station_ids[]
        in: query
        items:
          type: integer
        required: false
        description: Filter by radio station IDs
        schema:
          type: array
      - name: weeks
        in: query
        required: false
        description: 'Number of weeks for trend analysis. Default: 4'
        schema:
          type: integer
      responses:
        '200':
          description: Time analytics retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    peak_play_times:
                      peak_hour: 14
                      peak_day: 5
                      peak_day_name: Friday
                      hourly_distribution:
                        '8': 12
                        '14': 25
                        '20': 18
                      daily_distribution:
                        Monday: 20
                        Friday: 35
                        Saturday: 28
                    play_frequency_trend:
                      trend: stable
                      trend_percentage: 2.1
                      weekly_counts:
                        '2024-01-01': 45
                        '2024-01-08': 46
                      first_period_avg: 44.5
                      second_period_avg: 45.5
                    lifecycle_stats:
                      first_play: '2020-03-15T08:00:00Z'
                      last_play: '2024-12-01T22:00:00Z'
                      total_plays: 5420
                      days_since_first_play: 1722
                      days_since_last_play: 1
                      days_active: 1722
                      unique_days_played: 1200
                      average_plays_per_day: 3.15
                      play_consistency: 69.7
  "/api/v1/artists/{id}/air_plays":
    get:
      summary: Get artist air plays
      tags:
      - Artists
      description: Use either period OR start_time/end_time (mutually exclusive).
        Returns 400 if both provided.
      parameters:
      - name: id
        in: path
        required: true
        description: Artist ID
        schema:
          type: integer
      - name: period
        in: query
        required: false
        description: 'Time period: hour, two_hours, four_hours, eight_hours, twelve_hours,
          day, week, month, year, all. Default: day. Mutually exclusive with start_time/end_time'
        schema:
          type: string
      - name: start_time
        in: query
        required: false
        description: Custom start time (YYYY-MM-DDTHH:MM). Mutually exclusive with
          period
        schema:
          type: string
      - name: end_time
        in: query
        required: false
        description: Custom end time (YYYY-MM-DDTHH:MM). Defaults to current time
        schema:
          type: string
      - name: radio_station_ids[]
        in: query
        items:
          type: integer
        required: false
        description: Filter by radio station IDs
        schema:
          type: array
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      responses:
        '200':
          description: Air plays retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                    - id: '1'
                      type: air_play
                      attributes:
                        id: 1
                        broadcasted_at: '2024-12-01T14:30:00Z'
                        song:
                          id: 1
                          title: Bohemian Rhapsody
                          artists:
                          - id: 1
                            name: Queen
                        radio_station:
                          id: 1
                          name: Radio 538
                    total_entries: 150
                    total_pages: 7
                    current_page: 1
  "/api/v1/artists/{id}/similar_artists":
    get:
      summary: Get similar artists
      tags:
      - Artists
      description: Returns artists with the most overlapping genres and Last.fm tags,
        using Spotify popularity as tiebreaker
      parameters:
      - name: id
        in: path
        required: true
        description: Artist ID
        schema:
          type: integer
      - name: limit
        in: query
        required: false
        description: 'Maximum number of results (default: 10, max: 20)'
        schema:
          type: integer
      responses:
        '200':
          description: No similar artists when artist has no genres or tags
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                    - id: '2'
                      type: artist
                      attributes:
                        id: 2
                        name: Oasis
                        genres:
                        - rock
                        - britpop
                        lastfm_tags:
                        - rock
                        - britpop
                        - british
                        spotify_popularity: 80
  "/api/v1/artists/{id}/widget":
    get:
      summary: Get artist widget data
      tags:
      - Artists
      description: Returns widget data for an artist including total plays, total
        songs, number of radio stations, and country of origin.
      parameters:
      - name: id
        in: path
        required: true
        description: Artist ID
        schema:
          type: integer
      responses:
        '200':
          description: Widget data retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    total_played: 5420
                    total_songs: 25
                    radio_stations_count: 12
                    country_of_origin:
                    - United States
        '404':
          description: Artist not found
          content:
            application/json:
              examples:
                example:
                  value:
                    status: 404
                    error: Not Found
  "/api/v1/artists/{id}/bio":
    get:
      summary: Get artist biography from Wikipedia
      tags:
      - Artists
      parameters:
      - name: id
        in: path
        required: true
        description: Artist ID
        schema:
          type: integer
      - name: language
        in: query
        required: false
        description: 'Wikipedia language (en, nl, de, fr, es, it, pt, pl, ru, ja,
          zh). Default: en'
        schema:
          type: string
      responses:
        '200':
          description: Artist bio retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    bio:
                      summary: Coldplay are a British rock band formed in London in
                        1996.
                      content: Coldplay are a British rock band formed in London in
                        1996. The band consists of vocalist and pianist Chris Martin...
                      description: British rock band
                      url: https://en.wikipedia.org/wiki/Coldplay
                      wikibase_item: Q45188
                      thumbnail:
                        source: https://upload.wikimedia.org/coldplay.jpg
                        width: 320
                        height: 240
  "/api/v1/artists/natural_language_search":
    get:
      summary: Natural language search for artists
      tags:
      - Artists
      description: Translates a natural language query into structured filters using
        an LLM and returns matching artists.
      parameters:
      - name: q
        in: query
        required: true
        description: Natural language query (e.g. "Dutch pop artists played on NPO
          Radio 2")
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number for pagination (24 items per page)
        schema:
          type: integer
      responses:
        '200':
          description: Search results retrieved successfully
        '400':
          description: Missing query parameter
  "/api/v1/charts":
    get:
      summary: List chart positions
      tags:
      - Charts
      description: Returns chart positions with optional type, date, and pagination.
        Includes previous_position from the prior chart for movement indicators.
      parameters:
      - name: type
        in: query
        required: false
        description: 'Chart type: songs (default) or artists'
        schema:
          type: string
      - name: date
        in: query
        format: date
        required: false
        description: Chart date (YYYY-MM-DD). Defaults to latest available
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      responses:
        '200':
          description: Paginated chart positions
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                    - id: '1'
                      type: chart_position
                      attributes:
                        position: 1
                        counts: 42
                        previous_position: 3
                        song:
                          id: '5'
                          type: song
                          attributes:
                            id: 5
                            title: Bohemian Rhapsody
                            spotify_artwork_url: https://i.scdn.co/image/abc123
                            artists:
                            - id: 1
                              name: Queen
                        artist:
                    chart_date: '2026-03-01'
                    chart_type: songs
                    total_entries: 150
                    total_pages: 7
                    current_page: 1
        '404':
          description: Chart not found for given date
          content:
            application/json:
              examples:
                example:
                  value:
                    status: 404
                    error: Not Found
  "/api/v1/charts/search":
    get:
      summary: Search chart positions by song title or artist name
      tags:
      - Charts
      description: Search within chart positions by song title or artist name. Returns
        matching chart positions with previous_position for movement indicators.
      parameters:
      - name: search_term
        in: query
        required: true
        description: Search term to match against song title or artist name
        schema:
          type: string
      - name: date
        in: query
        format: date
        required: false
        description: Chart date (YYYY-MM-DD). Defaults to latest available
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      responses:
        '200':
          description: Empty results when no songs match
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                    - id: '1'
                      type: chart_position
                      attributes:
                        position: 3
                        counts: 35
                        previous_position: 5
                        song:
                          id: '5'
                          type: song
                          attributes:
                            id: 5
                            title: Hello
                            spotify_artwork_url: https://i.scdn.co/image/abc123
                            artists:
                            - id: 1
                              name: Adele
                        artist:
                    chart_date: '2026-03-01'
                    chart_type: songs
                    total_entries: 1
                    total_pages: 1
                    current_page: 1
  "/api/v1/charts/autocomplete":
    get:
      summary: Autocomplete songs
      tags:
      - Charts
      description: Search all songs for autocomplete, sorted by popularity.
      parameters:
      - name: q
        in: query
        required: true
        description: Search query string
        schema:
          type: string
      - name: limit
        in: query
        required: false
        description: 'Maximum number of results (default: 10, max: 20)'
        schema:
          type: integer
      responses:
        '200':
          description: Empty results
          content:
            application/json:
              examples:
                autocomplete_result:
                  value:
                    data:
                    - id: '1'
                      type: song
                      attributes:
                        id: 1
                        title: Hello
                        spotify_artwork_url: https://example.com/artwork.jpg
                        artists:
                        - id: 1
                          name: Adele
  "/api/v1/radio_station_classifiers":
    get:
      summary: List all radio station classifiers
      tags:
      - Radio Station Classifiers
      description: Returns audio feature classifiers for radio stations, aggregated
        by hour (0-23). Includes Spotify audio features like danceability, energy,
        valence, etc. Response includes attribute descriptions in the meta section.
      parameters:
      - name: radio_station_id
        in: query
        required: false
