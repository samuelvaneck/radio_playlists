        description: Filter by hour (0-23)
        schema:
          type: integer
      - name: period
        in: query
        required: false
        description: 'Time period for analysis. Legacy: day, week, month, year. Granular:
          1_day, 3_days, 2_weeks, 6_months, 1_year, etc.'
        schema:
          type: string
      - name: start_time
        in: query
        required: false
        description: Start time (ISO8601 or period string). Cannot be combined with
