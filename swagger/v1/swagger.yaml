  "/api/v1/radio_stations/new_played_songs":
    get:
      summary: Get newly played songs across all stations
      tags:
      - Radio Stations
      description: Use either period OR start_time/end_time (mutually exclusive).
        Returns 400 if both provided.
      parameters:
      - name: period
        in: query
        required: false
        description: 'Time period: hour, two_hours, four_hours, eight_hours, twelve_hours,
          day, week, month, year, all. Mutually exclusive with start_time/end_time'
        schema:
          type: string
      - name: start_time
        in: query
        required: false
        description: Custom start time (YYYY-MM-DDTHH:MM). Mutually exclusive with
          period
        schema:
          type: string
      - name: end_time
        in: query
        required: false
        description: Custom end time (YYYY-MM-DDTHH:MM). Defaults to current time
        schema:
          type: string
      - name: radio_station_ids[]
        in: query
        items:
          type: integer
        required: false
        description: Filter by radio station IDs
        schema:
          type: array
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      responses:
        '200':
          description: New played songs retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                    - id: '1'
                      type: song
                      attributes:
                        id: 1
                        title: New Release Song
                        spotify_artwork_url: https://i.scdn.co/image/new123
                        artists:
                        - id: 1
                          name: New Artist
                        first_broadcasted_at: '2024-12-01T10:00:00Z'
                        radio_station:
                          id: 1
                          name: Radio 538
                    total_entries: 25
                    total_pages: 2
                    current_page: 1
        '400':
          description: Period or start_time parameter is required
          content:
            application/json:
              examples:
                example:
                  value:
                    error: Period or start_time parameter is required
