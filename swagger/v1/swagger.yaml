  "/api/v1/songs/{id}/lyrics":
    get:
      summary: Get song lyrics metadata
      tags:
      - Songs
      description: 'Returns stored lyric metadata for a song (sentiment, themes, language).
        DB-only and fast; the full lyrics text is served by GET /api/v1/songs/{id}/lyrics/text.
        Returns data: null when no Lyric record exists.'
      parameters:
      - name: id
        in: path
        required: true
        description: Song ID or slug
        schema:
          type: integer
      responses:
        '200':
          description: Returns null data when no lyric record exists
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                      sentiment: 0.42
                      themes:
                      - love
                      - nostalgia
                      language: en
                      source: lrclib
                      source_url: https://lrclib.net/api/get/12345
                      enriched_at: '2026-04-20T14:33:11Z'
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    properties:
                      sentiment:
                        type: number
                        format: float
                        nullable: true
                      themes:
                        type: array
                        items:
                          type: string
                      language:
                        type: string
                        nullable: true
                      source:
                        type: string
                      source_url:
                        type: string
                        nullable: true
                      enriched_at:
                        type: string
                        format: date-time
                        nullable: true
        '404':
          description: Song not found
  "/api/v1/songs/{id}/lyrics/text":
    get:
      summary: Get song lyrics plain text
      tags:
      - Songs
      description: 'Returns the plain lyrics text fetched on-demand from LRCLIB (not
        stored locally for licensing reasons). Cached for 24 hours. Returns data:
        null when no Lyric record exists or the song is instrumental (LRCLIB has no
        plain lyrics).'
      parameters:
      - name: id
        in: path
        required: true
        description: Song ID or slug
        schema:
          type: integer
      responses:
        '200':
          description: Returns null data when LRCLIB has no plain lyrics (instrumental)
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                      lyrics: |-
                        Verse 1
                        Verse 2
                        ...
                      source: lrclib
                      source_url: https://lrclib.net/api/get/12345
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                    properties:
                      lyrics:
                        type: string
                      source:
                        type: string
                      source_url:
                        type: string
                        nullable: true
        '404':
          description: Song not found
  "/api/v1/songs/{id}/widget":
    get:
      summary: Get song widget data
      tags:
      - Songs
      description: Returns widget data for a song including total plays, number of
        radio stations, release date, and duration.
      parameters:
      - name: id
        in: path
        required: true
        description: Song ID
        schema:
          type: integer
      responses:
        '200':
          description: Widget data retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    total_played: 1250
                    radio_stations_count: 8
                    release_date: '2026-01-09'
                    duration_ms: 212000
        '404':
          description: Song not found
          content:
            application/json:
              examples:
                example:
                  value:
                    status: 404
                    error: Not Found
  "/api/v1/songs/{id}/music_profile":
    get:
      summary: Get song music profile (Spotify audio features)
      tags:
      - Songs
      description: Returns Spotify audio features for the song with attribute descriptions
        in metadata
      parameters:
      - name: id
        in: path
        required: true
        description: Song ID
        schema:
          type: integer
      responses:
        '200':
          description: Song has no music profile
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                    meta:
                      attribute_descriptions:
                        danceability:
                          name: Danceability
                          description: Describes how suitable a track is for dancing.
                          range: 0.0 to 1.0
                          high_threshold: 0.5
                        energy:
                          name: Energy
                          description: Represents intensity and activity. Energetic
                            tracks feel fast, loud, and noisy.
                          range: 0.0 to 1.0
                          high_threshold: 0.5
                        tempo:
                          name: Tempo
                          description: The overall estimated tempo of a track in beats
                            per minute (BPM).
                          range: 0 to 250 BPM
        '404':
          description: Song not found
          content:
            application/json:
              examples:
                example:
                  value:
                    status: 404
                    error: Not Found
  "/api/v1/songs/natural_language_search":
    get:
      summary: Natural language search for songs
      tags:
      - Songs
      description: Translates a natural language query into structured filters using
        an LLM and returns matching songs.
      parameters:
      - name: q
        in: query
        required: true
        description: Natural language query (e.g. "upbeat Dutch songs played on Radio
          538 last week")
        schema:
          type: string
      - name: page
        in: query
        required: false
        description: Page number for pagination (24 items per page)
        schema:
          type: integer
      responses:
        '200':
          description: Search results retrieved successfully
        '400':
          description: Missing query parameter
