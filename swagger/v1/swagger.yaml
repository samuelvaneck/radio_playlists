  "/api/v1/radio_stations/{id}/exposure_saturation":
    get:
      summary: Get exposure saturation analysis for a radio station
      tags:
      - Radio Stations
      description: Analyzes song exposure levels based on the mere exposure effect
        (Zajonc 1968). Calculates where each song sits on the inverted-U preference
        curve — optimal exposure increases liking, but overexposure leads to listener
        fatigue. Based on Chmiel & Schubert (2017) research on music preference and
        repeated exposure.
      parameters:
      - name: id
        in: path
        required: true
        description: Radio station ID
        schema:
          type: integer
      - name: start_time
        in: query
        required: false
        description: Custom start time (YYYY-MM-DDTHH:MM). Defaults to 1 week ago
        schema:
          type: string
      - name: end_time
        in: query
        required: false
        description: Custom end time (YYYY-MM-DDTHH:MM). Defaults to current time
        schema:
          type: string
      responses:
        '200':
          description: Exposure saturation data retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                      radio_station:
                        id: 1
                        name: Radio 538
                        slug: radio-538
                      period:
                        start_time: '2026-03-25T00:00:00Z'
                        end_time: '2026-04-01T00:00:00Z'
                      baseline:
                        median_plays: 5
                        mean_plays: 8.2
                        std_deviation: 12.3
                        total_songs: 320
                        total_plays: 2624
                      songs:
                      - song_id: 1
                        title: Overplayed Hit
                        artists:
                        - Artist
                        play_count: 45
                        plays_per_day: 6.43
                        exposure_ratio: 9.0
                        saturation_index: 0.002
                        status: heavily_overexposed
                      - song_id: 2
                        title: Well Balanced
                        artists:
                        - Other Artist
                        play_count: 8
                        plays_per_day: 1.14
                        exposure_ratio: 1.6
                        saturation_index: 0.995
                        status: optimal
                      overexposed_count: 5
                      underexposed_count: 12
        '404':
          description: Radio station not found
