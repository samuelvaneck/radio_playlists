  "/api/v1/radio_stations/{id}/diversity_metrics":
    get:
      summary: Get playlist diversity metrics for a radio station
      tags:
      - Radio Stations
      description: Calculates playlist diversity indices (Gini coefficient, Shannon
        entropy, HHI) measuring how concentrated or diverse a station's airplay distribution
        is. Based on Stirling (2007) diversity framework and ACM (2023) recommendation
        diversity research.
      parameters:
      - name: id
        in: path
        required: true
        description: Radio station ID
        schema:
          type: integer
      - name: start_time
        in: query
        required: false
        description: Custom start time (YYYY-MM-DDTHH:MM). Defaults to 4 weeks ago
        schema:
          type: string
      - name: end_time
        in: query
        required: false
        description: Custom end time (YYYY-MM-DDTHH:MM). Defaults to current time
        schema:
          type: string
      responses:
        '200':
          description: Diversity metrics retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                      radio_station:
                        id: 1
                        name: Radio 538
                        slug: radio-538
                      period:
                        start_time: '2026-03-01T00:00:00Z'
                        end_time: '2026-04-01T00:00:00Z'
                      metrics:
                        gini_coefficient: 0.72
                        shannon_entropy: 3.45
                        normalized_entropy: 0.68
                        hhi: 1250.0
                        label: moderately diverse
                      sample:
                        unique_songs: 450
                        total_plays: 8500
                      top_songs:
                      - song_id: 1
                        title: Popular Song
