  "/api/v1/songs/{id}/air_plays":
    get:
      summary: Get song air plays
      tags:
      - Songs
      description: Use either period OR start_time/end_time (mutually exclusive).
        Returns 400 if both provided.
      parameters:
      - name: id
        in: path
        required: true
        description: Song ID
        schema:
          type: integer
      - name: period
        in: query
        required: false
        description: 'Time period: hour, two_hours, four_hours, eight_hours, twelve_hours,
          day, week, month, year, all. Default: day. Mutually exclusive with start_time/end_time'
        schema:
          type: string
      - name: start_time
        in: query
        required: false
        description: Custom start time (YYYY-MM-DDTHH:MM). Mutually exclusive with
          period
        schema:
          type: string
      - name: end_time
        in: query
        required: false
        description: Custom end time (YYYY-MM-DDTHH:MM). Defaults to current time
        schema:
          type: string
      - name: radio_station_ids[]
        in: query
        items:
          type: integer
        required: false
        description: Filter by radio station IDs
        schema:
          type: array
      - name: page
        in: query
        required: false
        description: Page number
        schema:
          type: integer
      responses:
        '200':
          description: Air plays retrieved successfully
          content:
            application/json:
              examples:
                example:
                  value:
                    data:
                    - id: '1'
                      type: air_play
                      attributes:
                        id: 1
                        broadcasted_at: '2024-12-01T14:30:00Z'
                        song:
                          id: 1
                          title: Bohemian Rhapsody
                          artists:
                          - id: 1
                            name: Queen
                        radio_station:
                          id: 1
                          name: Radio 538
                    total_entries: 50
                    total_pages: 3
                    current_page: 1
